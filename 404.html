<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — MindFlow</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --g: #3DAA6C;
      --b: #2B8FD0;
    }

    .nav__logo-dot { background: var(--g); }

    .error-page {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(160deg, #f0faf4 0%, #EBF6FF 100%);
      padding-top: 80px;
      position: relative;
      overflow: hidden;
    }

    .error-page__blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(60px);
      animation: morphBlob 8s ease-in-out infinite;
    }

    .error-page__blob--1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(61,170,108,0.15), transparent);
      top: -100px; right: -100px;
    }

    .error-page__blob--2 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(43,143,208,0.12), transparent);
      bottom: -80px; left: -60px;
      animation-delay: -4s;
    }

    .error-content {
      position: relative;
      z-index: 1;
      max-width: 500px;
      padding: 0 24px;
    }

    .error-visual {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--g), var(--b));
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      animation: float 4s ease-in-out infinite;
      box-shadow:
        0 0 0 16px rgba(61,170,108,0.08),
        0 20px 60px rgba(61,170,108,0.25),
        inset -10px -8px 20px rgba(0,0,0,0.12),
        inset 8px 6px 16px rgba(255,255,255,0.2);
      position: relative;
    }

    .error-visual::before {
      content: '';
      position: absolute;
      top: 18%; left: 20%;
      width: 30%; height: 16%;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      filter: blur(4px);
      transform: rotate(-20deg);
    }

    .error-code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 20vw, 8rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--g), var(--b));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .error-title {
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      margin-bottom: 12px;
      color: var(--text-dark);
    }

    .error-desc {
      font-size: 0.95rem;
      color: var(--text-mid);
      margin-bottom: 36px;
      line-height: 1.7;
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* orbit rings around the sphere */
    .error-rings {
      position: absolute;
      top: 50%; left: 50%;
      pointer-events: none;
    }

    .error-ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid;
      top: 50%; left: 50%;
    }

    .error-ring--1 {
      width: 180px; height: 180px;
      margin: -90px 0 0 -90px;
      border-color: rgba(61,170,108,0.2);
      animation: orbitRing 6s linear infinite;
    }

    .error-ring--2 {
      width: 240px; height: 240px;
      margin: -120px 0 0 -120px;
      border-color: rgba(43,143,208,0.14);
      animation: orbitRing 10s linear infinite reverse;
    }

    .error-visual-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>

<nav class="nav" id="nav" aria-label="Main navigation">
  <div class="container">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo" aria-label="MindFlow Home">
        <span class="nav__logo-dot" aria-hidden="true"></span>
        MindFlow
      </a>
      <ul class="nav__links" role="list">
        <li><a href="index.html">Home</a></li>
        <li><a href="yoga.html">Yoga</a></li>
        <li><a href="dopamine-detox.html">Detox</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="error-page" aria-labelledby="error-heading">
  <div class="error-page__blob error-page__blob--1" aria-hidden="true"></div>
  <div class="error-page__blob error-page__blob--2" aria-hidden="true"></div>

  <div class="error-content">
    <div class="error-visual-wrap scene-3d" aria-hidden="true">
      <div class="error-ring error-ring--1"></div>
      <div class="error-ring error-ring--2"></div>
      <div class="error-visual">🌿</div>
    </div>

    <div class="error-code" aria-label="Error 404">404</div>
    <h1 class="error-title" id="error-heading">Page not found</h1>
    <p class="error-desc">
      Looks like this page took a digital detox of its own.<br>
      Let's get you back on the mat.
    </p>
    <div class="error-actions">
      <a href="index.html" class="btn btn--lg" style="background:#3DAA6C;color:#fff;">
        ← Back Home
      </a>
      <a href="yoga.html" class="btn btn--lg" style="background:#fff;color:#1E6640;border:2px solid rgba(61,170,108,0.3);">
        Explore Yoga
      </a>
      <a href="dopamine-detox.html" class="btn btn--lg" style="background:#fff;color:#1A5A87;border:2px solid rgba(43,143,208,0.3);">
        Explore Detox
      </a>
    </div>
  </div>
</main>

<script>
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 20), { passive: true });
</script>
</body>
</html>
